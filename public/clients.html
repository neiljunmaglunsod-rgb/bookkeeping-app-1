<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clients</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="brand">📒 BookKeeper</div>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/clients" class="active">Clients</a>
      <a href="/invoices">Invoices</a>
      <a href="/payments">Payments</a>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Clients</h1>
      <button class="btn btn-primary" onclick="openModal()">+ Add Client</button>
    </div>

    <table class="table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Business</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Service</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="clientList">
        <tr><td colspan="6" class="empty">Loading...</td></tr>
      </tbody>
    </table>
  </main>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Client</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <form id="clientForm">
        <input type="hidden" id="clientId" />
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="name" required />
          </div>
          <div class="form-group">
            <label>Business Name</label>
            <input type="text" id="businessName" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" id="phone" />
          </div>
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" id="address" />
        </div>
        <div class="form-group">
          <label>Service</label>
          <select id="service">
            <option value="">Select service</option>
            <option>Monthly Bookkeeping</option>
            <option>Quarterly Bookkeeping</option>
            <option>Payroll</option>
            <option>Tax Filing</option>
            <option>Financial Reporting</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="notes" rows="3"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Client</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let clients = [];

    async function loadClients() {
      clients = await fetch('/api/clients').then(r => r.json());
      const tbody = document.getElementById('clientList');
      if (clients.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No clients yet. Add your first client!</td></tr>';
        return;
      }
      tbody.innerHTML = clients.map(c => `
        <tr>
          <td>${c.name}</td>
          <td>${c.businessName || '—'}</td>
          <td>${c.email || '—'}</td>
          <td>${c.phone || '—'}</td>
          <td>${c.service || '—'}</td>
          <td>
            <button class="btn btn-sm btn-outline" onclick="editClient('${c._id}')">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteClient('${c._id}')">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    function openModal(client = null) {
      document.getElementById('modal').style.display = 'flex';
      document.getElementById('clientForm').reset();
      document.getElementById('clientId').value = '';
      document.getElementById('modalTitle').textContent = 'Add Client';
      if (client) {
        document.getElementById('modalTitle').textContent = 'Edit Client';
        document.getElementById('clientId').value = client._id;
        document.getElementById('name').value = client.name || '';
        document.getElementById('businessName').value = client.businessName || '';
        document.getElementById('email').value = client.email || '';
        document.getElementById('phone').value = client.phone || '';
        document.getElementById('address').value = client.address || '';
        document.getElementById('service').value = client.service || '';
        document.getElementById('notes').value = client.notes || '';
      }
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function editClient(id) {
      const client = clients.find(c => c._id === id);
      openModal(client);
    }

    async function deleteClient(id) {
      if (!confirm('Delete this client?')) return;
      await fetch(`/api/clients/${id}`, { method: 'DELETE' });
      loadClients();
    }

    document.getElementById('clientForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('clientId').value;
      const data = {
        name: document.getElementById('name').value,
        businessName: document.getElementById('businessName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        service: document.getElementById('service').value,
        notes: document.getElementById('notes').value,
      };
      const url = id ? `/api/clients/${id}` : '/api/clients';
      const method = id ? 'PUT' : 'POST';
      await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      closeModal();
      loadClients();
    });

    loadClients();
  </script>
</body>
</html>
