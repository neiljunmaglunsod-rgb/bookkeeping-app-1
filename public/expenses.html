<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expenses</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="brand">BBM BOOKKEEPING SERVICES</div>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/clients">Clients</a>
      <a href="/invoices">Invoices</a>
      <a href="/payments">Payments</a>
      <a href="/expenses" class="active">Expenses</a>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Expenses</h1>
      <button class="btn btn-primary" onclick="openModal()">+ Add Expense</button>
    </div>

    <table class="table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Category</th>
          <th>Amount</th>
          <th>Notes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="expenseList">
        <tr><td colspan="6" class="empty">Loading...</td></tr>
      </tbody>
    </table>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Expense</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <form id="expenseForm">
        <input type="hidden" id="expenseId" />
        <div class="form-row">
          <div class="form-group">
            <label>Date *</label>
            <input type="date" id="expDate" required />
          </div>
          <div class="form-group">
            <label>Amount (₱) *</label>
            <input type="number" id="amount" required min="0" step="0.01" />
          </div>
        </div>
        <div class="form-group">
          <label>Description *</label>
          <input type="text" id="description" required />
        </div>
        <div class="form-group">
          <label>Category *</label>
          <select id="category" required>
            <option value="">Select category</option>
            <option>Office Supplies</option>
            <option>Utilities</option>
            <option>Rent</option>
            <option>Salaries</option>
            <option>Software & Subscriptions</option>
            <option>Transportation</option>
            <option>Marketing</option>
            <option>Professional Fees</option>
            <option>Bank Charges</option>
            <option>Taxes & Licenses</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="expNotes" rows="2"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Expense</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let expenses = [];

    async function loadExpenses() {
      expenses = await fetch('/api/expenses').then(r => r.json());
      const tbody = document.getElementById('expenseList');
      if (expenses.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No expenses yet. Add your first expense!</td></tr>';
        return;
      }
      tbody.innerHTML = expenses.map(e => `
        <tr>
          <td>${new Date(e.date).toLocaleDateString()}</td>
          <td>${e.description}</td>
          <td><span class="badge draft">${e.category}</span></td>
          <td>₱${parseFloat(e.amount).toLocaleString()}</td>
          <td>${e.notes || '—'}</td>
          <td>
            <button class="btn btn-sm btn-outline" onclick="editExpense('${e._id}')">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteExpense('${e._id}')">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    function openModal(expense = null) {
      document.getElementById('modal').style.display = 'flex';
      document.getElementById('expenseForm').reset();
      document.getElementById('expenseId').value = '';
      document.getElementById('modalTitle').textContent = 'Add Expense';
      document.getElementById('expDate').value = new Date().toISOString().split('T')[0];
      if (expense) {
        document.getElementById('modalTitle').textContent = 'Edit Expense';
        document.getElementById('expenseId').value = expense._id;
        document.getElementById('expDate').value = expense.date ? expense.date.split('T')[0] : '';
        document.getElementById('amount').value = expense.amount || '';
        document.getElementById('description').value = expense.description || '';
        document.getElementById('category').value = expense.category || '';
        document.getElementById('expNotes').value = expense.notes || '';
      }
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function editExpense(id) {
      const expense = expenses.find(e => e._id === id);
      openModal(expense);
    }

    async function deleteExpense(id) {
      if (!confirm('Delete this expense?')) return;
      await fetch(`/api/expenses/${id}`, { method: 'DELETE' });
      loadExpenses();
    }

    document.getElementById('expenseForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('expenseId').value;
      const data = {
        date: document.getElementById('expDate').value,
        amount: parseFloat(document.getElementById('amount').value),
        description: document.getElementById('description').value,
        category: document.getElementById('category').value,
        notes: document.getElementById('expNotes').value,
      };
      const url = id ? `/api/expenses/${id}` : '/api/expenses';
      const method = id ? 'PUT' : 'POST';
      await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      closeModal();
      loadExpenses();
    });

    loadExpenses();
  </script>
</body>
</html>
