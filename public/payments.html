<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payments</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="brand">📒 BookKeeper</div>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/clients">Clients</a>
      <a href="/invoices">Invoices</a>
      <a href="/payments" class="active">Payments</a>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Payments</h1>
      <button class="btn btn-primary" onclick="openModal()">+ Record Payment</button>
    </div>

    <table class="table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Client</th>
          <th>Invoice #</th>
          <th>Amount</th>
          <th>Method</th>
          <th>Notes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="paymentList">
        <tr><td colspan="7" class="empty">Loading...</td></tr>
      </tbody>
    </table>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Record Payment</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <form id="paymentForm">
        <div class="form-group">
          <label>Invoice *</label>
          <select id="invoiceSelect" required onchange="fillClient()">
            <option value="">Select invoice</option>
          </select>
        </div>
        <div class="form-group">
          <label>Client</label>
          <input type="text" id="clientDisplay" disabled />
          <input type="hidden" id="clientId" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Amount (₱) *</label>
            <input type="number" id="amount" required min="1" />
          </div>
          <div class="form-group">
            <label>Date *</label>
            <input type="date" id="payDate" required />
          </div>
        </div>
        <div class="form-group">
          <label>Payment Method</label>
          <select id="method">
            <option value="bank transfer">Bank Transfer</option>
            <option value="cash">Cash</option>
            <option value="check">Check</option>
            <option value="gcash">GCash</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="payNotes" rows="2"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Payment</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let invoicesData = [];

    async function loadPayments() {
      const payments = await fetch('/api/payments').then(r => r.json());
      const tbody = document.getElementById('paymentList');
      if (payments.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">No payments recorded yet.</td></tr>';
        return;
      }
      tbody.innerHTML = payments.map(p => `
        <tr>
          <td>${new Date(p.date).toLocaleDateString()}</td>
          <td>${p.client ? (p.client.businessName || p.client.name) : '—'}</td>
          <td>${p.invoice ? p.invoice.invoiceNumber : '—'}</td>
          <td>₱${p.amount.toLocaleString()}</td>
          <td>${p.method}</td>
          <td>${p.notes || '—'}</td>
          <td>
            <button class="btn btn-sm btn-danger" onclick="deletePayment('${p._id}')">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    async function openModal() {
      document.getElementById('modal').style.display = 'flex';
      document.getElementById('paymentForm').reset();
      document.getElementById('payDate').value = new Date().toISOString().split('T')[0];
      const unpaid = await fetch('/api/invoices').then(r => r.json());
      invoicesData = unpaid.filter(i => i.status !== 'paid');
      const select = document.getElementById('invoiceSelect');
      select.innerHTML = '<option value="">Select invoice</option>' +
        invoicesData.map(inv => `<option value="${inv._id}" data-client-id="${inv.client?._id}" data-client="${inv.client?.businessName || inv.client?.name}" data-amount="${inv.total}">${inv.invoiceNumber} — ${inv.client?.businessName || inv.client?.name} (₱${inv.total.toLocaleString()})</option>`).join('');
    }

    function fillClient() {
      const select = document.getElementById('invoiceSelect');
      const opt = select.options[select.selectedIndex];
      document.getElementById('clientDisplay').value = opt.dataset.client || '';
      document.getElementById('clientId').value = opt.dataset.clientId || '';
      document.getElementById('amount').value = opt.dataset.amount || '';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function deletePayment(id) {
      if (!confirm('Delete this payment?')) return;
      await fetch(`/api/payments/${id}`, { method: 'DELETE' });
      loadPayments();
    }

    document.getElementById('paymentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        invoice: document.getElementById('invoiceSelect').value,
        client: document.getElementById('clientId').value,
        amount: parseFloat(document.getElementById('amount').value),
        date: document.getElementById('payDate').value,
        method: document.getElementById('method').value,
        notes: document.getElementById('payNotes').value,
      };
      await fetch('/api/payments', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      closeModal();
      loadPayments();
    });

    loadPayments();
  </script>
</body>
</html>
